{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="text-center">
        <h1 class="display-4 text-danger">Payment Failed</h1>
        <br>
        <p class="lead">We're sorry, but your transaction for your Order could not be processed at this time.<br><strong>Reason: {{reason}}</strong></p>
        <p>Please check your payment details and try again.</p>
        <hr>
        <a href="{% url 'payment' %}" class="btn btn-warning">Try Again</a>
        <a href="/" class="btn btn-primary">Home</a>
    </div>
</div>
{% endblock %}
